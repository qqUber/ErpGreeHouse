name: cd-dev

on:
  push:
    branches:
      - dev
      - dev-clean

concurrency:
  group: cd-dev
  cancel-in-progress: true

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: write
      issues: write
    services:
      redis:
        image: redis:8.0-alpine
        ports:
          - 6379:6379
    env:
      ERP_MOCK_MODE: 'true'
      ENVIRONMENT: development
      PYTHONPATH: ${{ github.workspace }}/middleware
      NODE_OPTIONS: --max-old-space-size=4096
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
      VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
      ERP_API_KEY: ${{ secrets.ERP_API_KEY }}
      ERP_API_SECRET: ${{ secrets.ERP_API_SECRET }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json
      - name: admin-ui build
        working-directory: admin-ui
        run: |
          npm ci
          npm run build
          tar -czf dist-dev-${GITHUB_SHA}.tar.gz -C dist .

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
      - name: middleware deps
        working-directory: middleware
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-html httpx structlog
      - name: middleware tests
        working-directory: middleware
        run: |
          mkdir -p ../out
          set -o pipefail
          set +e
          bash ./run_tests.sh 2>&1 | tee ../out/middleware-tests.log
          status=${PIPESTATUS[0]}
          set -e
          if [[ $status -ne 0 ]]; then
            msg=$(tail -n 60 ../out/middleware-tests.log | tr '\n' ' ' | sed 's/%/%25/g')
            echo "::error::middleware tests failed: ${msg}"
            exit $status
          fi
      - name: coverage gate (security/auth)
        working-directory: middleware
        run: |
          pytest -q \
            --cov=app.admin_auth_api \
            --cov=app.security \
            --cov=app.rate_limiter \
            --cov=app.request_context \
            --cov=app.runtime \
            --cov-report=term \
            --cov-fail-under=80

      - name: docker build middleware
        run: |
          docker build -f middleware/Dockerfile -t erpgreehouse-middleware:${GITHUB_SHA} ./middleware
          docker save erpgreehouse-middleware:${GITHUB_SHA} | gzip > middleware/middleware-image-dev-${GITHUB_SHA}.tar.gz

      - name: write manifest
        run: |
          mkdir -p out
          cat > out/manifest.json << EOF
          {
            "environment": "development",
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF
          echo "## CD (development)" >> $GITHUB_STEP_SUMMARY
          echo "- sha: ${GITHUB_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- artifacts: admin-ui dist, middleware image, middleware reports" >> $GITHUB_STEP_SUMMARY

      - name: upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dev-${{ github.sha }}
          path: |
            admin-ui/dist-dev-${{ github.sha }}.tar.gz
            middleware/middleware-image-dev-${{ github.sha }}.tar.gz
            middleware/reports
            out/manifest.json
          if-no-files-found: error

      - name: update deploy pointer
        run: |
          git fetch origin deploy-manifests || true
          if git show-ref --verify --quiet refs/remotes/origin/deploy-manifests; then
            git checkout -B deploy-manifests origin/deploy-manifests
          else
            git checkout -B deploy-manifests
          fi
          mkdir -p current
          cat > current/development.json << EOF
          {
            "environment": "development",
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "artifact": "dev-${GITHUB_SHA}"
          }
          EOF
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add current/development.json
          git commit -m "cd(dev): ${GITHUB_SHA}" || exit 0
          git push origin deploy-manifests

      - name: notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CD failed (development): ${context.sha}`,
              body: `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`
            })

      - name: upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dev-debug-${{ github.sha }}
          path: |
            out/middleware-tests.log
            middleware/reports
          if-no-files-found: warn
