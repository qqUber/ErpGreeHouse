name: pr

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
      - if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "Dependency review is not supported until Dependency graph is enabled for this repository."

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.93.8
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python,javascript-typescript
      - uses: github/codeql-action/analyze@v3

  precommit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
      - name: install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit
      - name: run pre-commit
        run: pre-commit run --all-files

  admin_ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json
      - name: install
        working-directory: admin-ui
        run: npm ci
      - name: audit
        working-directory: admin-ui
        run: npm audit --audit-level=high
      - name: Biome Check
        working-directory: admin-ui
        run: npm run ci:check
      - name: build
        working-directory: admin-ui
        run: npm run build
      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: admin-ui-dist
          path: admin-ui/dist
          if-no-files-found: error

  admin_ui_e2e:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.0-alpine
        ports:
          - 6379:6379
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      ERP_MOCK_MODE: 'true'
      E2E_TEST_MODE: 'true'
      PYTHONPATH: ${{ github.workspace }}/middleware
      ADMIN_BOOTSTRAP_DEFAULT: 'true'
      ADMIN_DEFAULT_USERNAME: admin
      ADMIN_DEFAULT_PASSWORD: admin
      ADMIN_OPERATOR_USERNAME: operator
      ADMIN_OPERATOR_PASSWORD: operator
      ADMIN_MARKETER_USERNAME: manager
      ADMIN_MARKETER_PASSWORD: manager
      CRM_DB_PATH: .local/crm.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
      - name: middleware deps
        working-directory: middleware
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json
      - name: admin-ui deps
        working-directory: admin-ui
        run: npm ci
      - name: install browsers
        working-directory: admin-ui
        run: npx playwright install --with-deps chromium
      - name: e2e
        working-directory: middleware
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
        run: |
          set -euo pipefail
          mid_pid=""
          ui_pid=""
          cleanup() { kill ${ui_pid:-} ${mid_pid:-} 2>/dev/null || true; }
          trap cleanup EXIT

          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          mid_pid=$!
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health >/dev/null && break || true
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/health >/dev/null

          cd ../admin-ui
          VITE_API_BASE_URL=http://127.0.0.1:8000 npm run dev -- --host 127.0.0.1 --port 5173 --strictPort &
          ui_pid=$!
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:5173/ >/dev/null && break || true
            sleep 1
          done
          curl -fsS http://127.0.0.1:5173/ >/dev/null

          npm run test:e2e
      - name: upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-ui-e2e
          path: |
            admin-ui/playwright-report
            admin-ui/test-results
            admin-ui/allure-results
          if-no-files-found: warn

  middleware:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.0-alpine
        ports:
          - 6379:6379
    permissions:
      contents: read
    env:
      ERP_MOCK_MODE: 'true'
      PYTHONPATH: ${{ github.workspace }}/middleware
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
      - name: install deps
        working-directory: middleware
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-html httpx structlog pip-audit bandit
      - name: pip audit
        working-directory: middleware
        run: pip-audit -r requirements.txt
      - name: bandit
        working-directory: middleware
        run: bandit -r app/ -q
      - name: tests
        working-directory: middleware
        run: bash ./run_tests.sh
      - name: coverage gate (security/auth)
        working-directory: middleware
        run: |
          pytest -q \
            --cov=app.admin_auth_api \
            --cov=app.security \
            --cov=app.rate_limiter \
            --cov=app.request_context \
            --cov=app.runtime \
            --cov-report=term \
            --cov-fail-under=80
      - name: upload reports
        uses: actions/upload-artifact@v4
        with:
          name: middleware-reports
          path: middleware/reports
          if-no-files-found: warn

  pr-summary:
    runs-on: ubuntu-latest
    needs:
      - dependency-review
      - secret-scan
      - codeql
      - precommit
      - admin_ui
      - admin_ui_e2e
      - middleware
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: summary
        run: |
          echo "## PR checks" >> $GITHUB_STEP_SUMMARY
          echo "- dependency-review: ok" >> $GITHUB_STEP_SUMMARY
          echo "- secret-scan: ok" >> $GITHUB_STEP_SUMMARY
          echo "- codeql: ok" >> $GITHUB_STEP_SUMMARY
          echo "- pre-commit: ok" >> $GITHUB_STEP_SUMMARY
          echo "- admin-ui: ok (artifact: admin-ui-dist)" >> $GITHUB_STEP_SUMMARY
          echo "- admin-ui e2e: ok (artifact: admin-ui-e2e)" >> $GITHUB_STEP_SUMMARY
          echo "- middleware: ok (artifact: middleware-reports)" >> $GITHUB_STEP_SUMMARY
      - uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'CI: все обязательные проверки прошли.',
              '',
              '- dependency-review: OK',
              '- secret-scan: OK',
              '- CodeQL: OK',
              '- pre-commit: OK',
              '- admin-ui build: OK (artifact: admin-ui-dist)',
              '- admin-ui e2e: OK (artifact: admin-ui-e2e)',
              '- middleware tests: OK (artifact: middleware-reports)'
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            })
