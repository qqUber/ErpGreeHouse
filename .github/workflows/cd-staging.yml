name: cd-staging

on:
  push:
    branches:
      - staging

concurrency:
  group: cd-staging
  cancel-in-progress: true

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: write
      issues: write
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      ERP_MOCK_MODE: 'true'
      ENVIRONMENT: staging
      PYTHONPATH: ${{ github.workspace }}/middleware
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json
      - name: admin-ui build
        working-directory: admin-ui
        run: |
          npm ci
          npm run build
          tar -czf dist-staging-${GITHUB_SHA}.tar.gz -C dist .

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: middleware deps
        working-directory: middleware
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-html httpx structlog
      - name: middleware tests
        working-directory: middleware
        run: bash ./run_tests.sh
      - name: coverage gate (security/auth)
        working-directory: middleware
        run: |
          pytest -q \
            --cov=app.admin_auth_api \
            --cov=app.security \
            --cov=app.rate_limit \
            --cov=app.request_context \
            --cov=app.runtime \
            --cov-report=term \
            --cov-fail-under=80

      - name: docker build middleware
        run: |
          docker build -f middleware/Dockerfile -t erpgreehouse-middleware:${GITHUB_SHA} ./middleware
          docker save erpgreehouse-middleware:${GITHUB_SHA} | gzip > middleware/middleware-image-staging-${GITHUB_SHA}.tar.gz

      - name: write manifest
        run: |
          mkdir -p out
          cat > out/manifest.json << EOF
          {
            "environment": "staging",
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF
          echo "## CD (staging)" >> $GITHUB_STEP_SUMMARY
          echo "- sha: ${GITHUB_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- artifacts: admin-ui dist, middleware image, middleware reports" >> $GITHUB_STEP_SUMMARY

      - name: upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: staging-${{ github.sha }}
          path: |
            admin-ui/dist-staging-${{ github.sha }}.tar.gz
            middleware/middleware-image-staging-${{ github.sha }}.tar.gz
            middleware/reports
            out/manifest.json
          if-no-files-found: error

      - name: update deploy pointer
        run: |
          git fetch origin deploy-manifests || true
          if git show-ref --verify --quiet refs/remotes/origin/deploy-manifests; then
            git checkout -B deploy-manifests origin/deploy-manifests
          else
            git checkout -B deploy-manifests
          fi
          mkdir -p current
          cat > current/staging.json << EOF
          {
            "environment": "staging",
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "artifact": "staging-${GITHUB_SHA}"
          }
          EOF
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add current/staging.json
          git commit -m "cd(staging): ${GITHUB_SHA}" || exit 0
          git push origin deploy-manifests

      - name: notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CD failed (staging): ${context.sha}`,
              body: `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`
            })
