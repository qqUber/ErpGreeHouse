name: Telegram Integration Tests

on:
  workflow_dispatch:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

concurrency:
  group: telegram-integration
  cancel-in-progress: true

jobs:
  telegram-integration:
    name: Real Telegram API Tests
    runs-on: ubuntu-latest
    environment: development
    
    steps:
      - uses: actions/checkout@v4

      - name: Ensure compose base .env exists
        run: touch .env

      - name: Run real Telegram integration tests
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          ERP_API_KEY: ${{ secrets.ERP_API_KEY }}
          ERP_API_SECRET: ${{ secrets.ERP_API_SECRET }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.telegram-test.yml up --build --exit-code-from telegram-integration telegram-integration

      - name: Stop Telegram test stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.telegram-test.yml down -v

      - name: Upload Telegram test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: telegram-integration-report
          path: middleware/reports/telegram_integration_report.html

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Telegram Integration Failed: ${context.sha}`,
              body: `Real Telegram API tests failed in CI/CD.\n\nRun: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}\n\nCheck Telegram bot configuration and API access.`
            })
