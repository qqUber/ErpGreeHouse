# GitHub Actions Workflow for Telegram CRM MVP Tests
# Location: .github/workflows/tests.yml

name: Tests

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # =============================================================================
  # Unit Tests (Run First)
  # =============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-html pytest-mock httpx structlog
      
      - name: Run unit tests
        working-directory: ./middleware
        run: |
          pytest tests/unit -v \
            --tb=short \
            --tb=line \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --html=reports/unit_report.html \
            --self-contained-html
        env:
          TEST_MODE: 'true'
          ERP_MOCK_MODE: 'true'
          REDIS_URL: 'redis://localhost:6379/1'
          DATABASE_URL: 'sqlite:///test_telegram_crm.db'
          JWT_SECRET_KEY: 'test-jwt-secret-key-ci'
          E2E_TEST_MODE: 'true'
          E2E_ADMIN_SECRET: 'test-secret-key'
      
      - name: Upload unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: middleware/reports/unit_report.html
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./middleware/reports/coverage.xml
          flags: unittests
          name: codecov-unit

  # =============================================================================
  # E2E Tests (Run After Unit Tests)
  # =============================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      E2E_TEST_MODE: 'true'
      E2E_ADMIN_SECRET: 'test-secret-key'
      E2E_BASE_URL: 'http://localhost:5173'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: ./admin-ui
        run: |
          npm ci
      
      - name: Build frontend
        working-directory: ./admin-ui
        run: |
          npm run build
      
      - name: Start backend server (background)
        working-directory: ./middleware
        run: |
          # Start Redis
          redis-server --daemonize yes
          # Initialize test database
          python -c "import sqlite3; conn = sqlite3.connect('test_telegram_crm.db'); conn.execute('CREATE TABLE IF NOT EXISTS admin_users (id INTEGER PRIMARY KEY, username TEXT UNIQUE, password_hash TEXT, role TEXT)'); conn.execute('INSERT OR IGNORE INTO admin_users (username, password_hash, role) VALUES (\"admin\", \"$2b$12$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/LewY5GyYqPLUzC7J2\", \"admin\")'); conn.execute('INSERT OR IGNORE INTO admin_users (username, password_hash, role) VALUES (\"manager\", \"$2b$12$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/LewY5GyYqPLUzC7J2\", \"manager\")'); conn.execute('INSERT OR IGNORE INTO admin_users (username, password_hash, role) VALUES (\"operator\", \"$2b$12$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/LewY5GyYqPLUzC7J2\", \"operator\")'); conn.commit(); conn.close()"
          # Start middleware in background
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          sleep 5
        env:
          TEST_MODE: 'true'
          ERP_MOCK_MODE: 'true'
          REDIS_URL: 'redis://localhost:6379/1'
          DATABASE_URL: 'sqlite:///test_telegram_crm.db'
          JWT_SECRET_KEY: 'test-jwt-secret-key-ci'
          ADMIN_SECRET: 'test-secret-key'
      
      - name: Start frontend server
        working-directory: ./admin-ui
        run: |
          nohup npm run dev > frontend.log 2>&1 &
          sleep 10
      
      - name: Wait for services
        run: |
          curl -f http://localhost:5173 || exit 1
          curl -f http://localhost:8000/health || exit 1
      
      - name: Run E2E tests (headless)
        working-directory: ./admin-ui
        run: |
          npm run test:e2e -- --reporter=list
        continue-on-error: true
      
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report
          path: |
            admin-ui/playwright-report/
            admin-ui/test-results/
      
      - name: Stop services
        if: always()
        run: |
          pkill -f "uvicorn" || true
          pkill -f "vite" || true

  # =============================================================================
  # Integration Tests
  # =============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-html pytest-mock httpx structlog
      
      - name: Run integration tests
        working-directory: ./middleware
        run: |
          pytest tests/integration -v \
            --tb=short \
            --tb=line \
            --html=reports/integration_report.html \
            --self-contained-html
        env:
          TEST_MODE: 'true'
          ERP_MOCK_MODE: 'true'
          REDIS_URL: 'redis://localhost:6379/1'
          DATABASE_URL: 'sqlite:///test_telegram_crm.db'
          JWT_SECRET_KEY: 'test-jwt-secret-key-ci'
          E2E_TEST_MODE: 'true'
          E2E_ADMIN_SECRET: 'test-secret-key'
      
      - name: Upload integration test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: middleware/reports/integration_report.html

  # =============================================================================
  # Security Tests
  # =============================================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run Bandit security scan
        working-directory: ./middleware
        run: |
          bandit -r app/ -f json -o reports/bandit_report.json || true
      
      - name: Run Safety dependency check
        working-directory: ./middleware
        run: |
          safety check --json --output reports/safety_report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: middleware/reports/

  # =============================================================================
  # Linting and Code Quality
  # =============================================================================
  linting:
    name: Linting & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort mypy
      
      - name: Run Black format check
        working-directory: ./middleware
        run: |
          black --check app/ tests/ || true
      
      - name: Run isort import check
        working-directory: ./middleware
        run: |
          isort --check-only app/ tests/ || true
      
      - name: Run Flake8 linting
        working-directory: ./middleware
        run: |
          flake8 app/ tests/ --max-line-length=88 --extend-ignore=E203,W503 || true
      
      - name: Run mypy type checking
        working-directory: ./middleware
        run: |
          mypy app/ --ignore-missing-imports || true

  # =============================================================================
  # Frontend Tests (admin-ui)
  # =============================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    env:
      E2E_TEST_MODE: 'true'
      E2E_ADMIN_SECRET: 'test-secret-key'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: ./admin-ui
        run: |
          npm ci
      
      - name: Run linting
        working-directory: ./admin-ui
        run: |
          npm run lint || true
      
      - name: Run type check
        working-directory: ./admin-ui
        run: |
          npm run type-check || true
      
      - name: Build frontend
        working-directory: ./admin-ui
        run: |
          npm run build

  # =============================================================================
  # Summary and Reporting
  # =============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, integration-tests, security-tests, linting, frontend-tests]
    if: always()
    
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports
      
      - name: Create test summary
        run: |
          echo "# Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "✅ Unit Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Unit Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ Integration Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Integration Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.e2e-tests.result }}" == "success" ]; then
            echo "✅ E2E Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ E2E Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.security-tests.result }}" == "success" ]; then
            echo "✅ Security Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Security Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.linting.result }}" == "success" ]; then
            echo "✅ Linting: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Linting: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.frontend-tests.result }}" == "success" ]; then
            echo "✅ Frontend Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Frontend Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
