# GitHub Actions Workflow for Telegram CRM MVP Tests
# Location: .github/workflows/tests.yml

name: Tests

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # =============================================================================
  # Unit Tests
  # =============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-html pytest-mock
      
      - name: Run unit tests
        working-directory: ./middleware
        run: |
          pytest tests/unit -v \
            --tb=short \
            --tb=line \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --html=reports/unit_report.html \
            --self-contained-html
        env:
          TEST_MODE: 'true'
          ERP_MOCK_MODE: 'true'
          REDIS_URL: 'redis://localhost:6379/1'
      
      - name: Upload unit test report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-report
          path: middleware/reports/unit_report.html
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./middleware/reports/coverage.xml
          flags: unittests
          name: codecov-unit

  # =============================================================================
  # Integration Tests
  # =============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-html fakeredis
      
      - name: Run integration tests
        working-directory: ./middleware
        run: |
          pytest tests/integration -v \
            --tb=short \
            --tb=line \
            --html=reports/integration_report.html \
            --self-contained-html
        env:
          TEST_MODE: 'true'
          ERP_MOCK_MODE: 'true'
          REDIS_URL: 'redis://localhost:6379/1'
          DATABASE_URL: 'sqlite:///test_telegram_crm.db'
      
      - name: Upload integration test report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-report
          path: middleware/reports/integration_report.html

  # =============================================================================
  # Security Tests
  # =============================================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run Bandit security scan
        working-directory: ./middleware
        run: |
          bandit -r app/ -f json -o reports/bandit_report.json || true
      
      - name: Run Safety dependency check
        working-directory: ./middleware
        run: |
          safety check --json --output reports/safety_report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: middleware/reports/

  # =============================================================================
  # Linting and Code Quality
  # =============================================================================
  linting:
    name: Linting & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort mypy
      
      - name: Run Black format check
        working-directory: ./middleware
        run: |
          black --check app/ tests/
      
      - name: Run isort import check
        working-directory: ./middleware
        run: |
          isort --check-only app/ tests/
      
      - name: Run Flake8 linting
        working-directory: ./middleware
        run: |
          flake8 app/ tests/ --max-line-length=88 --extend-ignore=E203,W503
      
      - name: Run mypy type checking
        working-directory: ./middleware
        run: |
          mypy app/ --ignore-missing-imports || true

  # =============================================================================
  # Frontend Tests (admin-ui)
  # =============================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: ./admin-ui
        run: |
          npm ci
      
      - name: Run linting
        working-directory: ./admin-ui
        run: |
          npm run lint || true
      
      - name: Run type check
        working-directory: ./admin-ui
        run: |
          npm run type-check || true
      
      - name: Build frontend
        working-directory: ./admin-ui
        run: |
          npm run build

  # =============================================================================
  # Summary and Reporting
  # =============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests, linting, frontend-tests]
    if: always()
    
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v3
        with:
          path: reports
      
      - name: Create test summary
        run: |
          echo "# Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "✅ Unit Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Unit Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ Integration Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Integration Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.security-tests.result }}" == "success" ]; then
            echo "✅ Security Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Security Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.linting.result }}" == "success" ]; then
            echo "✅ Linting: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Linting: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.frontend-tests.result }}" == "success" ]; then
            echo "✅ Frontend Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Frontend Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
