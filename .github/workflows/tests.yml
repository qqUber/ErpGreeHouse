# GitHub Actions Workflow for Telegram CRM MVP Tests
# Location: .github/workflows/tests.yml

name: Tests

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # =============================================================================
  # Unit Tests (Run First)
  # =============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare CI env file
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=testing
          DEBUG_MODE=false
          TEST_MODE=true
          E2E_TEST_MODE=true
          REDIS_URL=redis://redis:6379/1
          DATABASE_URL=sqlite:///test_telegram_crm.db
          CRM_DB_PATH=test_telegram_crm.db
          JWT_SECRET_KEY=test-jwt-secret-key-ci
          E2E_ADMIN_SECRET=test-secret-key
          TELEGRAM_BOT_TOKEN=test_token_123456789:AABBccDDeeFFggHHiiJJkkLLmmNNooP
          TELEGRAM_CHANNEL_ID=-100123456789
          EOF
      - name: Run unit tests in Docker
        run: |
          E2E_ARGS="" docker compose -f docker-compose.yml -f docker-compose.test.yml up --build --exit-code-from backend-test-unit backend-test-unit

      - name: Stop unit test stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

      - name: Upload unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: middleware/reports/unit_report.html

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./middleware/reports/coverage.xml
          flags: unittests
          name: codecov-unit

  # =============================================================================
  # E2E Tests (Run After Unit Tests)
  # =============================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Prepare CI env file
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=testing
          DEBUG_MODE=false
          TEST_MODE=true
          E2E_TEST_MODE=true
          REDIS_URL=redis://redis:6379/1
          DATABASE_URL=sqlite:///test_telegram_crm.db
          CRM_DB_PATH=test_telegram_crm.db
          JWT_SECRET_KEY=test-jwt-secret-key-ci
          E2E_ADMIN_SECRET=test-secret-key
          TELEGRAM_BOT_TOKEN=test_token_123456789:AABBccDDeeFFggHHiiJJkkLLmmNNooP
          TELEGRAM_CHANNEL_ID=-100123456789
          EOF
      - name: Run E2E tests in Docker
        run: |
          E2E_ARGS="" docker compose -f docker-compose.yml -f docker-compose.test.yml up --build --exit-code-from e2e-runner e2e-runner

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report
          path: |
            admin-ui/playwright-report/
            admin-ui/test-results/
      - name: Stop E2E test stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

  # =============================================================================
  # Integration Tests
  # =============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare CI env file
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=testing
          DEBUG_MODE=false
          TEST_MODE=true
          E2E_TEST_MODE=true
          REDIS_URL=redis://redis:6379/1
          DATABASE_URL=sqlite:///test_telegram_crm.db
          CRM_DB_PATH=test_telegram_crm.db
          JWT_SECRET_KEY=test-jwt-secret-key-ci
          E2E_ADMIN_SECRET=test-secret-key
          TELEGRAM_BOT_TOKEN=test_token_123456789:AABBccDDeeFFggHHiiJJkkLLmmNNooP
          TELEGRAM_CHANNEL_ID=-100123456789
          EOF
      - name: Run integration tests in Docker
        run: |
          E2E_ARGS="" docker compose -f docker-compose.yml -f docker-compose.test.yml up --build --exit-code-from backend-test-integration backend-test-integration

      - name: Stop integration test stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

      - name: Upload integration test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: middleware/reports/integration_report.html

  # =============================================================================
  # Security Tests
  # =============================================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Create reports directory
        working-directory: ./middleware
        run: |
          mkdir -p reports

      - name: Run Bandit security scan
        working-directory: ./middleware
        run: |
          bandit -r middleware/app/ -f json -o reports/bandit_report.json

      - name: Run Safety dependency check
        working-directory: ./middleware
        run: |
          safety check --json > reports/safety_report.json 2>&1

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: middleware/reports/

  # =============================================================================
  # Linting and Code Quality
  # =============================================================================
  linting:
    name: Linting & Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./middleware
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort mypy

      - name: Run Black format check
        working-directory: ./middleware
        run: |
          black --check app/ tests/

      - name: Run isort import check
        working-directory: ./middleware
        run: |
          isort --check-only app/ tests/ || true

      - name: Run Flake8 linting
        working-directory: ./middleware
        run: |
          flake8 app/ tests/ --max-line-length=88 --extend-ignore=E203,W503,E501,F401,E402,W291,W391,W293,F841,F541,E231,E201,E202,E712,E722,F811 || true

      - name: Run mypy type checking
        working-directory: ./middleware
        run: |
          mypy app/ --ignore-missing-imports || true

  # =============================================================================
  # Frontend Tests (admin-ui)
  # =============================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    env:
      E2E_TEST_MODE: 'true'
      E2E_ADMIN_SECRET: 'test-secret-key'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install dependencies
        working-directory: ./admin-ui
        run: |
          npm ci

      - name: Run linting
        working-directory: ./admin-ui
        run: |
          npm run lint

      - name: Run type check
        working-directory: ./admin-ui
        run: |
          npm run type-check

      - name: Build frontend
        working-directory: ./admin-ui
        run: |
          npm run build

  # =============================================================================
  # Summary and Reporting
  # =============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, integration-tests, security-tests, linting, frontend-tests]
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Create test summary
        run: |
          echo "# Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "✅ Unit Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Unit Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ Integration Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Integration Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.e2e-tests.result }}" == "success" ]; then
            echo "✅ E2E Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ E2E Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.security-tests.result }}" == "success" ]; then
            echo "✅ Security Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Security Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.linting.result }}" == "success" ]; then
            echo "✅ Linting: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Linting: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.frontend-tests.result }}" == "success" ]; then
            echo "✅ Frontend Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Frontend Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
