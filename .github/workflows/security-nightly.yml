name: security-nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: security-nightly
  cancel-in-progress: true

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: build middleware image
        run: docker build -f middleware/Dockerfile -t erpgreehouse-middleware:scan ./middleware

      - name: trivy fs (sarif)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: upload trivy fs sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

      - name: trivy image (sarif)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: erpgreehouse-middleware:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: upload trivy image sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

      - name: attach reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-nightly
          path: |
            trivy-fs.sarif
            trivy-image.sarif
          if-no-files-found: error
