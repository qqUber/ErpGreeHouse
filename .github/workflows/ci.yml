name: ci

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.0-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: admin-ui build
        working-directory: admin-ui
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: middleware deps
        working-directory: middleware
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-html httpx structlog

      - name: middleware tests
        working-directory: middleware
        env:
          ERP_MOCK_MODE: 'true'
        run: |
          bash ./run_tests.sh

      - name: coverage security/auth
        working-directory: middleware
        env:
          ERP_MOCK_MODE: 'true'
        run: |
          pytest -q \
            --cov=app.admin_auth_api \
            --cov=app.security \
            --cov=app.rate_limiter \
            --cov=app.request_context \
            --cov=app.runtime \
            --cov-report=term \
            --cov-fail-under=80

      - name: ui e2e
        run: |
          touch .env
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build e2e-runner
          timeout 45s docker compose -f docker-compose.yml -f docker-compose.test.yml logs -f --tail=50 e2e-runner || true
          CID="$(docker compose -f docker-compose.yml -f docker-compose.test.yml ps -aq e2e-runner | tail -n 1)"
          if [ -z "$CID" ]; then
            echo "E2E runner container ID not found"
            docker compose -f docker-compose.yml -f docker-compose.test.yml logs e2e-runner
            exit 1
          fi
          timeout 1800 bash -c "until [ \"\$(docker inspect -f '{{.State.Status}}' \"$CID\")\" = \"exited\" ]; do sleep 10; done" || \
          { echo "E2E tests timed out"; docker compose -f docker-compose.yml -f docker-compose.test.yml logs e2e-runner; exit 1; }
          [ "$(docker inspect -f '{{.State.ExitCode}}' "$CID")" = "0" ] || \
          { echo "E2E tests failed"; docker compose -f docker-compose.yml -f docker-compose.test.yml logs e2e-runner; exit 1; }

      - name: stop e2e stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

      - name: docker build middleware
        run: |
          docker build -f middleware/Dockerfile -t erpgreehouse-middleware:ci ./middleware

      - name: compose config validate
        run: |
          docker compose -f prod/docker-compose.yml config >/dev/null
