name: ci

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: admin-ui build
        working-directory: admin-ui
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: middleware deps
        working-directory: middleware
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-html httpx structlog
          python -m pip install playwright pytest-playwright
          python -m playwright install chromium

      - name: middleware tests
        working-directory: middleware
        env:
          ERP_MOCK_MODE: 'true'
        run: |
          bash ./run_tests.sh

      - name: coverage security/auth
        working-directory: middleware
        env:
          ERP_MOCK_MODE: 'true'
        run: |
          pytest -q \
            --cov=app.admin_auth_api \
            --cov=app.security \
            --cov=app.rate_limit \
            --cov=app.request_context \
            --cov=app.runtime \
            --cov-report=term \
            --cov-fail-under=80

      - name: docker build middleware
        run: |
          docker build -f middleware/Dockerfile -t erpgreehouse-middleware:ci ./middleware

      - name: compose config validate
        run: |
          docker compose -f docker-compose.yml config >/dev/null
