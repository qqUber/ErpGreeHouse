name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - dev-clean

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.0-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: admin-ui build
        working-directory: admin-ui
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: middleware deps
        working-directory: middleware
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-html httpx structlog

      - name: middleware tests
        working-directory: middleware
        env:
          ERP_MOCK_MODE: 'true'
        run: |
          bash ./run_tests.sh

      - name: coverage security/auth
        working-directory: middleware
        env:
          ERP_MOCK_MODE: 'true'
        run: |
          pytest -q \
            --cov=app.admin_auth_api \
            --cov=app.security \
            --cov=app.rate_limiter \
            --cov=app.request_context \
            --cov=app.runtime \
            --cov-report=term \
            --cov-fail-under=80

      - name: ui e2e
        env:
          ERP_MOCK_MODE: 'true'
          E2E_TEST_MODE: 'true'
          PYTHONPATH: ${{ github.workspace }}/middleware
          ADMIN_BOOTSTRAP_DEFAULT: 'true'
          ADMIN_DEFAULT_USERNAME: admin
          ADMIN_DEFAULT_PASSWORD: admin
          ADMIN_OPERATOR_USERNAME: operator
          ADMIN_OPERATOR_PASSWORD: operator
          ADMIN_MARKETER_USERNAME: manager
          ADMIN_MARKETER_PASSWORD: manager
          CRM_DB_PATH: .local/crm.db
          E2E_BASE_URL: http://127.0.0.1:5173
        run: |
          set -euo pipefail
          mid_pid=""
          ui_pid=""
          cleanup() { kill ${ui_pid:-} ${mid_pid:-} 2>/dev/null || true; }
          trap cleanup EXIT

          cd middleware
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          mid_pid=$!
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/health >/dev/null && break || true
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/health >/dev/null

          cd ../admin-ui
          npx playwright install --with-deps chromium
          VITE_API_BASE_URL=http://127.0.0.1:8000 npm run dev -- --host 127.0.0.1 --port 5173 --strictPort &
          ui_pid=$!
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:5173/ >/dev/null && break || true
            sleep 1
          done
          curl -fsS http://127.0.0.1:5173/ >/dev/null

          npm run test:e2e

      - name: docker build middleware
        run: |
          docker build -f middleware/Dockerfile -t erpgreehouse-middleware:ci ./middleware

      - name: compose config validate
        run: |
          docker compose -f prod/docker-compose.yml config >/dev/null
