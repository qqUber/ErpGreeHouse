name: e2e-dev

on:
  push:
    branches:
      - dev

concurrency:
  group: e2e-dev
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: smoke
            shard: 1
            shards: 1
          - project: critical
            shard: 1
            shards: 2
          - project: critical
            shard: 2
            shards: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: prepare ci env file
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=testing
          DEBUG_MODE=false
          TEST_MODE=true
          E2E_TEST_MODE=true
          REDIS_URL=redis://redis:6379/1
          DATABASE_URL=sqlite:///test_telegram_crm.db
          CRM_DB_PATH=test_telegram_crm.db
          JWT_SECRET_KEY=test-jwt-secret-key-ci
          E2E_ADMIN_SECRET=test-secret-key
          TELEGRAM_BOT_TOKEN=test_token_123456789:AABBccDDeeFFggHHiiJJkkLLmmNNooP
          TELEGRAM_CHANNEL_ID=-100123456789
          EOF
      - name: run e2e in docker compose
        env:
          E2E_ARGS: --project ${{ matrix.project }} --shard ${{ matrix.shard }}/${{ matrix.shards }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm -e E2E_ARGS="${E2E_ARGS}" e2e-runner
      - name: upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-${{ matrix.project }}-${{ matrix.shard }}of${{ matrix.shards }}
          path: |
            admin-ui/playwright-report
            admin-ui/test-results
            admin-ui/allure-results
          if-no-files-found: warn

      - name: stop e2e stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

      - name: notify slack
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then exit 0; fi
          payload=$(cat <<EOF
          {"text":"E2E failed: ${{ github.repository }} @ ${{ github.sha }} (project=${{ matrix.project }}, shard=${{ matrix.shard }}/${{ matrix.shards }})\\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
          EOF
          )
          curl -fsS -X POST -H 'Content-Type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}"

      - name: notify teams
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "${TEAMS_WEBHOOK_URL}" ]; then exit 0; fi
          payload=$(cat <<EOF
          {"text":"E2E failed: ${{ github.repository }} @ ${{ github.sha }} (project=${{ matrix.project }}, shard=${{ matrix.shard }}/${{ matrix.shards }})\\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
          EOF
          )
          curl -fsS -X POST -H 'Content-Type: application/json' --data "${payload}" "${TEAMS_WEBHOOK_URL}"

  allure_report:
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: merge allure results
        run: |
          mkdir -p merged/allure-results
          find artifacts -type d -name allure-results -print0 | while IFS= read -r -d '' d; do
            cp -R "$d/"* merged/allure-results/ 2>/dev/null || true
          done
      - name: generate allure report
        working-directory: admin-ui
        run: |
          npm ci
          npx allure generate ../merged/allure-results --clean -o ../merged/allure-report
      - name: upload allure report
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: merged/allure-report
          if-no-files-found: warn

  publish-gh-pages:
    runs-on: ubuntu-latest
    needs: [allure_report]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: prepare gh-pages content
        run: |
          set -euo pipefail
          TS=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          mkdir -p gh-pages
          # Copy merged Allure report
          if [ -d artifacts/allure-report ]; then
            cp -R artifacts/allure-report gh-pages/allure-report
          else
            echo "No allure-report artifact found" > gh-pages/allure-report/README.txt || true
          fi
          # Copy first available Playwright HTML report
          PW_SRC=""
          while IFS= read -r -d '' d; do
            if [ -d "$d/playwright-report" ]; then
              PW_SRC="$d/playwright-report"
              break
            fi
          done < <(find artifacts -maxdepth 2 -type d -print0)
          if [ -n "$PW_SRC" ]; then
            cp -R "$PW_SRC" gh-pages/playwright-report
          else
            mkdir -p gh-pages/playwright-report
            echo "No playwright-report found" > gh-pages/playwright-report/README.txt
          fi
          # Index with metadata
          cat > gh-pages/index.html << EOF
          <!doctype html><html><head><meta charset="utf-8"><title>Test Reports</title><style>body{font-family:system-ui,Arial,sans-serif;padding:24px}a{display:block;margin:8px 0}</style></head><body>
          <h1>ERP Greenhouse Reports</h1>
          <p>Generated at (UTC): ${TS}</p>
          <p>Commit: ${GITHUB_SHA}</p>
          <a href="./allure-report/index.html">Allure Report</a>
          <a href="./playwright-report/index.html">Playwright Report</a>
          </body></html>
          EOF
      - name: publish to gh-pages
        run: |
          set -euo pipefail
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout -B gh-pages
          fi
          rm -rf *
          cp -R gh-pages/* .
          git add .
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git commit -m "reports: publish allure/playwright for ${GITHUB_SHA}" || true
          git push origin gh-pages
