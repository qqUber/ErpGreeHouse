services:
  # Redis for caching and session management
  redis-test:
    image: redis:8.0-alpine
    container_name: erp_test_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_test_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - test_network

  # PostgreSQL for testing (optional, SQLite is default)
  postgres-test:
    image: postgres:18-alpine
    container_name: erp_test_postgres
    environment:
      POSTGRES_DB: telegram_crm_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - test_network
    profiles:
      - postgres

  # Mock ERPNext server for integration tests
  mock-erp:
    build:
      context: .
      dockerfile: Dockerfile.mock
    container_name: erp_test_mock
    ports:
      - "8080:8080"
    environment:
      MOCK_MODE: "true"
      LOG_LEVEL: "DEBUG"
    networks:
      - test_network
    profiles:
      - mock

  # Test runner service
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp_test_runner
    environment:
      - TEST_MODE=true
      - ERP_MOCK_MODE=true
      - REDIS_URL=redis://redis-test:6379/1
      - DATABASE_URL=sqlite:///tmp/test_telegram_crm.db
    volumes:
      - ./tests:/app/tests
      - ./reports:/app/reports
    depends_on:
      redis-test:
        condition: service_healthy
    networks:
      - test_network
    command: pytest tests/ -v --tb=short
    profiles:
      - ci

networks:
  test_network:
    driver: bridge

volumes:
  redis_test_data:
  postgres_test_data:
