# mypy configuration for middleware
# Run with: mypy --config-file=middleware/mypy.ini

[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = False
disallow_untyped_defs = False
ignore_missing_imports = True
no_implicit_optional = False
warn_redundant_casts = False
warn_unused_ignores = False
warn_no_return = False
warn_unreachable = False
strict_optional = False
check_untyped_defs = False
error_summary = False

# Ignore missing imports for third-party packages without stubs
ignore_missing_imports = True

# Exclude vendor directories and third-party code
exclude =
    ^\.venv/
    ^venv/
    ^vendor/
    ^node_modules/
    ^tests/
    ^mypy_cache/
    ^\.pytest_cache/
    ^app/handlers\.py$
    ^app/integrations/bots/vk_handler\.py$
    ^app/integrations_api\.py$
    ^app/admin_api\.py$
    ^app/services/location_service\.py$
    ^app/integrations/bots/shared/registration\.py$
    ^app/integrations/webhooks\.py$
    ^app/tenant_api\.py$
    ^app/roadmap_api\.py$
    ^app/products_api\.py$
    ^app/dashboard_api\.py$
    ^app/analytics_api\.py$
    ^app/middlewares\.py$
    ^app/integrations/bots/telegram_handler\.py$
    ^app/integration_settings_api\.py$
    ^app/main\.py$

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-aiogram.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-celery.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-lxml.*]
ignore_missing_imports = True
