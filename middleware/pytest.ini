[pytest]
testpaths = tests
norecursedirs = .venv venv Lib Scripts reports .pytest_cache node_modules vendor
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage configuration - exclude vendor and third-party code
addopts =
    --strict-markers
    --tb=short
    -ra

filterwarnings =
    ignore:Call to '__init__' function with deprecated usage of input argument/s 'retry_on_timeout':DeprecationWarning
    ignore:'asyncio.get_event_loop_policy' is deprecated:DeprecationWarning
    ignore:Setting per-request cookies=<...> is being deprecated:DeprecationWarning
    ignore:on_event is deprecated:DeprecationWarning
    ignore:Call to '__init__' function with deprecated usage of input argument/s 'lib_name':DeprecationWarning
    ignore:Call to '__init__' function with deprecated usage of input argument/s 'lib_version':DeprecationWarning
    ignore:'asyncio.set_event_loop_policy' is deprecated:DeprecationWarning

# Test markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    fast: marks tests as fast (run by default in pre-push)
    integration: marks tests as integration tests (not run in pre-push)
    unit: marks tests as unit tests (run in pre-push)
    asyncio: marks tests as async tests

# Coverage options - only analyze our code, not dependencies
[coverage:run]
source = app
omit =
    */tests/*
    */test_*.py
    */.venv/*
    */venv/*
    */vendor/*
    */node_modules/*
    */__pycache__/*
    */mypy_cache/*
    */.pytest_cache/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
