services:
  # Redis for caching
  redis:
    image: redis:8.0-alpine
    container_name: erp_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data

  # Backend API
  backend:
    build:
      context: ./middleware
      dockerfile: Dockerfile
      target: development
    container_name: erp_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./middleware:/app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./middleware
      dockerfile: Dockerfile
      target: development
    container_name: erp_worker
    command: ["celery", "-A", "app.worker", "worker", "-l", "info"]
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./middleware:/app
    depends_on:
      redis:
        condition: service_healthy

  ngrok:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      target: development
    container_name: erp_ngrok
    command: ["node", "scripts/ngrok/backend.mjs"]
    env_file:
      - .env
    environment:
      - NGROK_ADDR=backend:8000
    volumes:
      - ./admin-ui:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      target: development
    container_name: erp_frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - E2E_API_BASE_URL=http://backend:8000
    volumes:
      - ./admin-ui:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
