# Real Telegram Integration Test Override
# This compose file overrides the test configuration to use REAL Telegram tokens
# ONLY used in CI/CD telegram-integration workflow

services:
  # Override backend-test-integration to use real tokens
  backend-test-integration:
    environment:
      PYTHONPATH: /app
      TEST_MODE: "true"
      ERP_MOCK_MODE: "true"
      DEBUG_MODE: "false"
      REDIS_URL: redis://redis:6379/1
      DATABASE_URL: sqlite:///test_telegram_crm.db
      CRM_DB_PATH: test_telegram_crm.db
      JWT_SECRET_KEY: test-jwt-secret-key-ci
      E2E_TEST_MODE: "true"
      E2E_ADMIN_SECRET: test-secret-key
      # REAL tokens from GitHub secrets (only in CI/CD)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      VK_ACCESS_TOKEN: ${VK_ACCESS_TOKEN}
      VK_GROUP_ID: ${VK_GROUP_ID}
      ERP_API_KEY: ${ERP_API_KEY}
      ERP_API_SECRET: ${ERP_API_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    volumes:
      - ./middleware:/app
      - ./middleware/reports:/app/reports
      - test_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "pytest tests/integration/test_telegram_integration.py -v --tb=short --tb=line
      --html=reports/telegram_integration_report.html
      --self-contained-html"

  # Dedicated Telegram integration test service
  telegram-integration:
    build:
      context: ./middleware
      dockerfile: Dockerfile
      target: test
    container_name: erp_telegram_integration
    environment:
      PYTHONPATH: /app
      TEST_MODE: "true"
      ERP_MOCK_MODE: "true"
      DEBUG_MODE: "false"
      REDIS_URL: redis://redis:6379/1
      DATABASE_URL: sqlite:///test_telegram_crm.db
      CRM_DB_PATH: test_telegram_crm.db
      JWT_SECRET_KEY: test-jwt-secret-key-ci
      E2E_TEST_MODE: "true"
      E2E_ADMIN_SECRET: test-secret-key
      # REAL tokens from GitHub secrets (only in CI/CD)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      VK_ACCESS_TOKEN: ${VK_ACCESS_TOKEN}
      VK_GROUP_ID: ${VK_GROUP_ID}
      ERP_API_KEY: ${ERP_API_KEY}
      ERP_API_SECRET: ${ERP_API_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    volumes:
      - ./middleware:/app
      - ./middleware/reports:/app/reports
      - test_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "pytest tests/integration/test_telegram_integration.py -v --tb=short --tb=line
      --html=reports/telegram_integration_report.html
      --self-contained-html"

volumes:
  test_data:
