# Production Docker Compose - Telegram CRM Middleware + ERPNext
# Используется для развёртывания в production окружении
#
# Data Localization Compliance (152-FZ):
# - Все компоненты (PostgreSQL, Redis, ERPNext) должны быть размещены на территории РФ
# - Резервные копии баз данных хранятся локально внутри РФ
# - Не допускается передача персональных данных за границу


version: "3.9"

services:
  # ============================================
  # ERPNext Stack
  # ============================================
  erpnext:
    image: frappe/erpnext:version-15
    restart: always
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - REDIS_SOCKETIO=redis-socketio:6379
      - SITES=${ERP_SITE_NAME:-erp.yourdomain.com}
      - ADMIN_PASSWORD=${ERP_ADMIN_PASSWORD:?ERP_ADMIN_PASSWORD is required}
    networks:
      - erp_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/method/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  erpnext-nginx:
    image: frappe/erpnext-nginx:version-15
    restart: always
    ports:
      - "${ERP_HTTP_PORT:-8080}:8080"
    environment:
      - UPSTREAM_REAL_IP_ADDRESS=127.0.0.1
      - FRAPPE_SITE_NAME_HEADER=${ERP_SITE_NAME:-erp.yourdomain.com}
    depends_on:
      erpnext:
        condition: service_healthy
    networks:
      - erp_net

  db:
    image: mariadb:10.6
    restart: always
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
      --innodb-buffer-pool-size=1G
      --max-connections=500
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      - MYSQL_DATABASE=erpnext
    volumes:
      - db-data:/var/lib/mysql
      - db-backups:/backups
    networks:
      - erp_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-cache:
    image: redis:8.0-alpine
    restart: always
    command: ["redis-server", "--save", "900", "1", "--save", "300", "10", "--save", "60", "10000"]
    volumes:
      - redis-cache-data:/data
    networks:
      - erp_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-queue:
    image: redis:8.0-alpine
    restart: always
    command: ["redis-server", "--save", "900", "1", "--save", "300", "10", "--save", "60", "10000"]
    volumes:
      - redis-queue-data:/data
    networks:
      - erp_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Data Localization Compliance (152-FZ):
    # - Redis кэш размещается на территории РФ
    # - Данные кэша не передаются за границу

  redis-socketio:
    image: redis:8.0-alpine
    restart: always
    networks:
      - erp_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # Middleware Stack (Telegram CRM)
  # ============================================
  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis-queue:6379/1
      - ERP_API_BASE_URL=http://erpnext:8000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-telegram_crm}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG_MODE=false
      - TEST_MODE=false
    depends_on:
      redis-queue:
        condition: service_healthy
      db:
        condition: service_healthy
    ports:
      - "${MIDDLEWARE_PORT:-8000}:8000"
    networks:
      - erp_net
    volumes:
      - middleware-receipts:/app/receipts
      - middleware-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    restart: always
    command: ["celery", "-A", "app.worker", "worker", "-l", "info", "-c", "${CELERY_WORKER_CONCURRENCY:-4}"]
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis-queue:6379/1
      - ERP_API_BASE_URL=http://erpnext:8000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-telegram_crm}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis-queue:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - erp_net
    volumes:
      - middleware-receipts:/app/receipts
      - middleware-logs:/app/logs

  # ============================================
  # PostgreSQL для Middleware (опционально)
  # ============================================
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - POSTGRES_DB=${DB_NAME:-telegram_crm}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backups:/backups
    networks:
      - erp_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-telegram_crm}"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Data Localization Compliance (152-FZ):
    # - База данных размещается на территории РФ
    # - Резервные копии хранятся локально в томе postgres-backups

  # ============================================
  # Nginx Reverse Proxy (опционально)
  # ============================================
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - middleware
      - erpnext-nginx
    networks:
      - erp_net

volumes:
  sites:
  db-data:
  db-backups:
  redis-cache-data:
  redis-queue-data:
  postgres-data:
  postgres-backups:
  middleware-receipts:
  middleware-logs:
  nginx-logs:

networks:
  erp_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
