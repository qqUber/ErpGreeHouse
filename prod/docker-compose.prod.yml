# Production Override
services:
  redis:
    container_name: erp_prod_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_prod_data:/data

  backend:
    build:
      target: production
    container_name: erp_prod_backend
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    volumes:
      - prod_data:/app/data

  frontend:
    build:
      target: production
    container_name: erp_prod_frontend
    ports:
      - "80:80"
    env_file:
      - .env.prod
    volumes: []

volumes:
  redis_prod_data:
  prod_data:
