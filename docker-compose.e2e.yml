# Docker Compose for E2E Testing
# Usage: docker-compose -f docker-compose.e2e.yml up --abort-on-container-exit

version: '3.8'

services:
  # Redis for caching
  redis-e2e:
    image: redis:8.0-alpine
    container_name: erp_e2e_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Backend API
  backend-e2e:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    container_name: erp_e2e_backend
    ports:
      - "8000:8000"
    environment:
      - E2E_TEST_MODE=true
      - E2E_ADMIN_SECRET=test-secret-key
      - REDIS_URL=redis://redis-e2e:6379/0
      - DATABASE_URL=sqlite:///app/data/e2e.db
      - ENVIRONMENT=development
    volumes:
      - ./middleware/app:/app/app
      - e2e_data:/app/data
    depends_on:
      redis-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Frontend
  frontend-e2e:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    container_name: erp_e2e_frontend
    ports:
      - "5173:5173"
    environment:
      - E2E_API_BASE_URL=http://backend-e2e:8000
    depends_on:
      backend-e2e:
        condition: service_healthy

  # E2E Test Runner
  e2e-runner:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: erp_e2e_runner
    working_dir: /app
    volumes:
      - ./admin-ui:/app
      - ./screenshots:/app/screenshots
    environment:
      - E2E_BASE_URL=http://frontend-e2e:5173
      - E2E_API_BASE_URL=http://backend-e2e:8000
      - E2E_ADMIN_SECRET=test-secret-key
      - CI=true
    depends_on:
      - backend-e2e
      - frontend-e2e
    command: >
      bash -c "npm install && npx playwright install && npm run test:e2e:smoke"

volumes:
  e2e_data:
