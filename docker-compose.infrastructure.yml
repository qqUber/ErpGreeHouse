version: "3.9"

services:
  erpnext:
    image: frappe/erpnext-worker:version-15
    restart: unless-stopped
    environment:
      - SITES=erp.localhost
    depends_on:
      - redis-cache
      - redis-queue
    networks:
      - backend

  erpnext-nginx:
    image: frappe/erpnext-nginx:version-15
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - UPSTREAM_REAL_IP_ADDRESS=127.0.0.1
      - FRAPPE_SITE_NAME_HEADER=erp.localhost
    depends_on:
      - erpnext
    networks:
      - backend

  redis-cache:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--save", ""]
    networks:
      - backend

  redis-queue:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--save", ""]
    networks:
      - backend

  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./middleware/.env.example
    depends_on:
      - redis-queue
    ports:
      - "8000:8000"
    networks:
      - backend

  worker:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "app.worker", "worker", "-l", "info"]
    env_file:
      - ./middleware/.env.example
    depends_on:
      - redis-queue
    networks:
      - backend

networks:
  backend:
    name: erpnext_backend
