# E2E Override Configuration

services:
  redis:
    container_name: erp_e2e_redis
    
  backend:
    container_name: erp_e2e_backend
    
  frontend:
    container_name: erp_e2e_frontend
    ports:
      - "5174:5173"
    
  e2e-runner:
    container_name: erp_e2e_runner

# Use a different network name to avoid conflicts
networks:
  default:
    name: erp_e2e_network
