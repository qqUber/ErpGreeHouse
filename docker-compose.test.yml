# Test Override (Unit, Integration, E2E)
services:
  redis:
    container_name: erp_test_redis
    ports: []

  backend-test-unit:
    build:
      context: ./middleware
      dockerfile: Dockerfile
      target: test
    container_name: erp_test_backend_unit
    environment:
      PYTHONPATH: /app
      TEST_MODE: "true"
      ERP_MOCK_MODE: "true"
      DEBUG_MODE: "false"
      REDIS_URL: redis://redis:6379/1
      DATABASE_URL: sqlite:///app/data/test_telegram_crm.db
      CRM_DB_PATH: /app/data/test_telegram_crm.db
      JWT_SECRET_KEY: test-jwt-secret-key-ci-2026-secure-random-entropy-32b
      E2E_TEST_MODE: "true"
      ADMIN_SECRET: test-secret-key
      TELEGRAM_BOT_TOKEN: test_token_123456789:AABBccDDeeFFggHHiiJJkkLLmmNNooP
      TELEGRAM_CHANNEL_ID: "-100123456789"
    volumes:
      - ./middleware:/app
      - ./middleware/reports:/app/reports
      - test_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "pytest tests/unit -v --tb=short --tb=line
      --cov=app
      --cov-report=term-missing
      --cov-report=xml:/app/reports/coverage.xml
      --html=/app/reports/unit_report.html
      --self-contained-html"

  backend-test-integration:
    build:
      context: ./middleware
      dockerfile: Dockerfile
      target: test
    container_name: erp_test_backend_integration
    environment:
      PYTHONPATH: /app
      TEST_MODE: "true"
      ERP_MOCK_MODE: "true"
      DEBUG_MODE: "false"
      REDIS_URL: redis://redis:6379/1
      DATABASE_URL: sqlite:///app/data/test_telegram_crm.db
      CRM_DB_PATH: /app/data/test_telegram_crm.db
      JWT_SECRET_KEY: test-jwt-secret-key-ci-2026-secure-random-entropy-32b
      E2E_TEST_MODE: "true"
      ADMIN_SECRET: test-secret-key
      TELEGRAM_BOT_TOKEN: test_token_123456789:AABBccDDeeFFggHHiiJJkkLLmmNNooP
      TELEGRAM_CHANNEL_ID: "-100123456789"
    volumes:
      - ./middleware:/app
      - ./middleware/reports:/app/reports
      - test_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "pytest tests/integration -v --tb=short --tb=line
      --html=/app/reports/integration_report.html
      --self-contained-html"

  backend-e2e:
    build:
      context: ./middleware
      dockerfile: Dockerfile
      target: development
    container_name: erp_test_backend_e2e
    environment:
      PYTHONPATH: /app
      TEST_MODE: "true"
      ERP_MOCK_MODE: "true"
      DEBUG_MODE: "true"
      REDIS_URL: redis://redis:6379/1
      DATABASE_URL: sqlite:///app/data/test_telegram_crm.db
      CRM_DB_PATH: /app/data/test_telegram_crm.db
      JWT_SECRET_KEY: test-jwt-secret-key-ci-2026-secure-random-entropy-32b
      E2E_TEST_MODE: "true"
      ADMIN_SECRET: test-secret-key
      CORS_ORIGINS: http://frontend-e2e:5173,http://localhost:5173,http://localhost:3000
      RATE_LIMIT_REQUESTS: "100000"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      TELEGRAM_BOT_TOKEN: test_token_123456789:AABBccDDeeFFggHHiiJJkkLLmmNNooP
      TELEGRAM_CHANNEL_ID: "-100123456789"
    volumes:
      - ./middleware:/app
      - test_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    command: >
      sh -c "python tests/init_db.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend-e2e:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      target: development
    container_name: erp_test_frontend_e2e
    environment:
      VITE_API_BASE_URL: http://backend-e2e:8000
      VITE_E2E_TEST_MODE: "true"
      E2E_API_BASE_URL: http://backend-e2e:8000
      E2E_BASE_URL: http://frontend-e2e:5173
    volumes:
      - ./admin-ui:/app
      - /app/node_modules
    depends_on:
      backend-e2e:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:5173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    command: npm run dev -- --host 0.0.0.0 --port 5173 --strictPort

  e2e-runner:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    container_name: erp_test_e2e_runner
    working_dir: /app
    environment:
      CI: "true"
      E2E_RETRIES: "2"
      E2E_RETRY_BASE_MS: "750"
      E2E_BASE_URL: http://frontend-e2e:5173
      E2E_API_BASE_URL: http://backend-e2e:8000
      E2E_TEST_MODE: "true"
      ADMIN_SECRET: test-secret-key
      E2E_ARGS: ${E2E_ARGS:-}
    volumes:
      - ./admin-ui:/app
    depends_on:
      backend-e2e:
        condition: service_healthy
      frontend-e2e:
        condition: service_healthy
    command: >
      sh -c "npm ci &&
      npm run test:e2e -- --reporter=list ${E2E_ARGS}"

volumes:
  test_data:
